name: Periodic Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check health
        uses: jtalk/url-health-check-action@v4
        with:
          url: https://full-stack-open-pokedex-q7ae.onrender.com/health
          max-attempts: 3
          retry-delay: 5s
